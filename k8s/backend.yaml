apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: trading-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: trading-dashboard-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: trading-dashboard-config
          env:
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AUTH_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: trading-dashboard
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
